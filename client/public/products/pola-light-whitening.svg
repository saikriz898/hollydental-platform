<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#162540"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#a8c8ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a8c8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="device" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde6f5"/>
    </linearGradient>
    <linearGradient id="led" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfe1ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfe1ff"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9A96E"/>
      <stop offset="1" stop-color="#9b8048"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="380" ry="220" fill="url(#glow)"/>

  <!-- LED Mouthpiece -->
  <g transform="translate(400 260)">
    <!-- Outer mouthpiece curve -->
    <path d="M -170 -10 Q -170 -80, -90 -85 Q 0 -90, 90 -85 Q 170 -80, 170 -10 Q 170 50, 100 60 Q 0 70, -100 60 Q -170 50, -170 -10 Z"
          fill="url(#device)"
          stroke="#C9A96E"
          stroke-width="2"
          stroke-opacity="0.6"/>
    <!-- LED strip -->
    <path d="M -150 -25 Q -90 -65, 0 -68 Q 90 -65, 150 -25"
          fill="none"
          stroke="url(#led)"
          stroke-width="14"
          stroke-linecap="round"/>
    <!-- LED dots -->
    <g fill="#ffffff">
      <circle cx="-110" cy="-50" r="4"/>
      <circle cx="-70" cy="-58" r="4"/>
      <circle cx="-30" cy="-62" r="4"/>
      <circle cx="10" cy="-62" r="4"/>
      <circle cx="50" cy="-60" r="4"/>
      <circle cx="90" cy="-55" r="4"/>
      <circle cx="120" cy="-45" r="4"/>
    </g>
    <!-- Cable -->
    <path d="M 170 -10 Q 230 0, 250 50" stroke="#C9A96E" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Whitening gel syringe -->
  <g transform="translate(220 460) rotate(-18)">
    <rect x="-80" y="-12" width="160" height="24" rx="12" fill="url(#tube)"/>
    <rect x="78" y="-8" width="22" height="16" rx="3" fill="#9b8048"/>
    <rect x="-92" y="-10" width="14" height="20" rx="4" fill="#9b8048"/>
    <text x="-30" y="4" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="1">POLA GEL 6%</text>
  </g>

  <!-- Caption -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" letter-spacing="1">Pola Light Whitening Kit</text>
  <text x="400" y="568" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#C9A96E" letter-spacing="3">LED ACTIVATOR · 5-DAY SYSTEM</text>
</svg>
