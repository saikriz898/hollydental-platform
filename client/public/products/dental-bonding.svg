<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#1a2c47"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#C9A96E" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tooth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3eada"/>
    </linearGradient>
    <linearGradient id="composite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9A96E"/>
      <stop offset="1" stop-color="#a78550"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Tooth illustration -->
  <g transform="translate(400 320)">
    <path d="M -120 -120 C -160 -110, -170 -50, -150 30 C -135 90, -110 140, -90 160 C -70 175, -55 130, -45 90 C -38 70, -25 60, -10 60 C 5 60, 18 70, 25 90 C 35 130, 50 175, 70 160 C 90 140, 115 90, 130 30 C 150 -50, 140 -110, 100 -120 C 70 -128, 50 -110, 30 -110 C 10 -110, -10 -118, -30 -118 C -50 -118, -70 -128, -120 -120 Z"
          fill="url(#tooth)"
          stroke="#C9A96E"
          stroke-width="3"
          stroke-opacity="0.4"/>
    <!-- Composite bonding highlight -->
    <path d="M -25 -90 C -10 -100, 15 -100, 30 -85 C 35 -70, 25 -55, 5 -50 C -15 -48, -28 -65, -25 -90 Z"
          fill="url(#composite)"
          opacity="0.85"/>
    <!-- Subtle shine -->
    <path d="M -75 -90 Q -65 -75, -70 -50" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.55"/>
  </g>

  <!-- Caption -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" letter-spacing="1">Dental Bonding</text>
  <text x="400" y="568" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#C9A96E" letter-spacing="3">CHAIRSIDE PROCEDURE</text>
</svg>
