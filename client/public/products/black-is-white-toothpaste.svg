<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f1ea"/>
      <stop offset="1" stop-color="#e8e0d0"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="0.45" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9A96E"/>
      <stop offset="1" stop-color="#9b8048"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A96E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="320" rx="320" ry="180" fill="url(#shine)"/>

  <!-- Tube body, rotated slightly -->
  <g transform="translate(400 300) rotate(-12)">
    <!-- Tube -->
    <rect x="-200" y="-70" width="400" height="140" rx="20" fill="url(#tube)"/>
    <!-- Crimp -->
    <path d="M -200 -70 L -230 -85 L -230 85 L -200 70 Z" fill="#0a0a0a"/>
    <path d="M -210 -55 L -210 55" stroke="#3a3a3a" stroke-width="1.5"/>
    <path d="M -220 -45 L -220 45" stroke="#3a3a3a" stroke-width="1.5"/>

    <!-- Cap -->
    <rect x="200" y="-55" width="40" height="110" rx="6" fill="url(#cap)"/>
    <rect x="240" y="-55" width="14" height="110" rx="4" fill="#9b8048"/>

    <!-- Brand line -->
    <text x="-150" y="-15" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="2">BLACK</text>
    <text x="-150" y="20" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#C9A96E" letter-spacing="6">IS WHITE</text>
    <text x="-150" y="48" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#cccccc" letter-spacing="2">ACTIVATED CARBON · LIME MINT</text>

    <!-- Decorative dots -->
    <circle cx="170" cy="-30" r="3" fill="#C9A96E"/>
    <circle cx="180" cy="0" r="3" fill="#C9A96E"/>
    <circle cx="170" cy="30" r="3" fill="#C9A96E"/>
  </g>

  <!-- Caption -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#0A1628" letter-spacing="1">Black Is White Toothpaste</text>
  <text x="400" y="568" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#C9A96E" letter-spacing="3">CURAPROX · 90ml</text>
</svg>
